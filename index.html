<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network DOS Attack</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 15px #00ff4133;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(6, 50px);
            grid-template-rows: repeat(6, 50px);
            gap: 10px;
            margin: 20px 0;
        }

        .node {
            width: 50px;
            height: 50px;
            border: 1px solid #004411;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            user-select: none;
        }

        .node:hover {
            background: #00ff4122;
        }

        .node.start { border-color: #00ff41; color: #fff; background: #004411; }
        .node.exit { border-color: #ff0041; color: #fff; background: #440011; }
        
        .node.empty { color: #222; } /* Hidden/Filler nodes */

        #status { margin-bottom: 10px; font-weight: bold; }
        #timer { font-size: 20px; color: #ff0041; }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>SYSTEM DOS IN PROGRESS</h2>
        <div id="status">CORRECT THE PATH TO THE EXIT</div>
        <div id="timer">TIME REMAINING: 30s</div>
        <div id="grid"></div>
        <button onclick="initGame()" style="background: none; border: 1px solid #00ff41; color: #00ff41; padding: 10px; cursor: pointer;">RESTART SYSTEM</button>
    </div>

    <script>
        const GRID_SIZE = 6;
        const directions = ['↑', '→', '↓', '←'];
        let gridData = [];
        let timeLeft = 30;
        let timerInterval;

        function initGame() {
            clearInterval(timerInterval);
            timeLeft = 30;
            document.getElementById('timer').innerText = `TIME REMAINING: ${timeLeft}s`;
            createGrid();
            startTimer();
        }

        function createGrid() {
            const gridElement = document.getElementById('grid');
            gridElement.innerHTML = '';
            gridData = [];

            // 1. Create empty grid
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                gridData.push({
                    index: i,
                    dir: Math.floor(Math.random() * 4),
                    isPath: false,
                    isFixed: false
                });
            }

            // 2. Define Start and Exit
            const startIdx = 0;
            const exitIdx = (GRID_SIZE * GRID_SIZE) - 1;
            gridData[startIdx].isFixed = true;
            gridData[exitIdx].isFixed = true;

            // 3. Render Nodes
            gridData.forEach((data, i) => {
                const node = document.createElement('div');
                node.classList.add('node');
                if (i === startIdx) node.classList.add('start');
                if (i === exitIdx) node.classList.add('exit');
                
                node.innerText = directions[data.dir];
                node.onclick = () => rotateNode(i, node);
                
                gridElement.appendChild(node);
            });
        }

        function rotateNode(index, element) {
            // Logic: Cycle through directions
            gridData[index].dir = (gridData[index].dir + 1) % 4;
            element.innerText = directions[gridData[index].dir];
            checkWin();
        }

        function checkWin() {
            let current = 0; // Start at top left
            const exit = (GRID_SIZE * GRID_SIZE) - 1;
            const visited = new Set();

            while (current !== exit) {
                if (visited.has(current)) break; // Loop detected
                visited.add(current);

                let x = current % GRID_SIZE;
                let y = Math.floor(current / GRID_SIZE);
                let dir = gridData[current].dir;

                // Move based on arrow
                if (dir === 0) y--; // Up
                else if (dir === 1) x++; // Right
                else if (dir === 2) y++; // Down
                else if (dir === 3) x--; // Left

                // Boundary check
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) break;

                current = y * GRID_SIZE + x;
                
                if (current === exit) {
                    clearInterval(timerInterval);
                    alert("ACCESS GRANTED. SYSTEM BYPASSED.");
                    return;
                }
            }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `TIME REMAINING: ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("HACK DETECTED. SYSTEM LOCKED.");
                    initGame();
                }
            }, 1000);
        }

        initGame();
    </script>
</body>
</html>
